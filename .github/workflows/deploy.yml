name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    uses: matt-riley/matt-riley-ci/.github/workflows/cloudflare-pages-deploy.yml@92dae3a7b997354d5b579165f9e0cbe3463905c2 # main
    with:
      project-name: agengit-docs
      package-manager: pnpm
    secrets:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
