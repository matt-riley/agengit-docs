[tools]
node = "24"
pnpm = "10.34.4"

[tasks.install]
description = "Install dependencies"
run = "pnpm install --frozen-lockfile"

[tasks.build]
description = "Build the app"
run = "pnpm run build"

[tasks.test]
description = "Run tests"
run = "pnpm run test"

[tasks.lint]
description = "Run linter"
run = "pnpm run lint"

[tasks.fmt]
description = "Check formatting"
run = "pnpm run format:check"
